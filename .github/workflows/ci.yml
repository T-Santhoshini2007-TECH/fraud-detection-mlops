name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model (generates artifacts needed by API tests)
        run: python -m src.models.train

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Lint check (non-blocking)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src/ tests/ --output-format=github

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.train -t fraud-trainer .

      - name: Run training in container (sanity check the image works)
        run: docker run --rm -v ${{ github.workspace }}/models:/app/models fraud-trainer

      - name: Build API serving image
        run: docker build -f docker/Dockerfile.api -t fraud-api .
