# Render Blueprint — deploy with "New + Blueprint" on render.com,
# pointing at this repo. Creates both the API and the dashboard as
# free-tier web services.
#
# This blueprint assumes models/*.joblib and the processed CSVs are
# already committed to the repo (see .gitignore) — so the deployed
# containers can load them directly without a training step at deploy
# time. Free-tier Render doesn't support preDeployCommand, so this is
# also the only option for free-tier deployment, not just the easiest.
# Re-run `python -m src.models.train` locally and push if you want to
# update the deployed model.

services:
  - type: web
    name: fraud-detection-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.api
    dockerContext: .
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health

  - type: web
    name: fraud-detection-dashboard
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.dashboard
    dockerContext: .
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"